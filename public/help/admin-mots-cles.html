<h2>Gestion des mots-clés</h2>
<p>Les mots-clés enrichissent les citations et facilitent la recherche.</p>
<p>Ils sont normalisés à l'écriture (insensibles à la casse). L'IA peut en suggérer lors du traitement d'un lot, mais chaque suggestion doit être validée manuellement avant d'être appliquée.</p>
